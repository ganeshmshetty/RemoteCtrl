name: Build Electron App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application (Vite & ESBuild)
        run: npm run build

      - name: Package with Electron Builder (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win -c.extraMetadata.main=dist/main/index.cjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package with Electron Builder (Mac)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac -c.extraMetadata.main=dist/main/index.cjs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remctrl-release-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
          retention-days: 7
